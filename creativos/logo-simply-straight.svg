<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="roseGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A0B4"/>
      <stop offset="50%" style="stop-color:#D4788F"/>
      <stop offset="100%" style="stop-color:#C4687A"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5F7"/>
      <stop offset="100%" style="stop-color:#FFE8EC"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="240" fill="url(#bgGrad)" stroke="url(#roseGold)" stroke-width="3"/>

  <!-- Hair straightener icon - stylized -->
  <!-- Top plate -->
  <rect x="170" y="100" width="160" height="40" rx="12" fill="url(#roseGold)" opacity="0.9"/>

  <!-- Bottom plate -->
  <rect x="170" y="150" width="160" height="40" rx="12" fill="url(#roseGold)" opacity="0.6"/>

  <!-- Handle -->
  <rect x="215" y="190" width="70" height="90" rx="20" fill="url(#roseGold)" opacity="0.85"/>

  <!-- Power cord hint -->
  <path d="M250 280 Q250 310 250 320" stroke="url(#roseGold)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Sparkle 1 -->
  <g transform="translate(350,80)">
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#E8A0B4" stroke-width="3" stroke-linecap="round"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#E8A0B4" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#E8A0B4" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#E8A0B4" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Sparkle 2 -->
  <g transform="translate(130,300)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#D4788F" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#D4788F" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text: Simply Straight -->
  <text x="250" y="390" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#B85068" letter-spacing="2">
    SIMPLY
  </text>
  <text x="250" y="435" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="300" fill="#C4687A" letter-spacing="4">
    STRAIGHT
  </text>

  <!-- Small decorative line -->
  <line x1="160" y1="450" x2="340" y2="450" stroke="#E8A0B4" stroke-width="1.5" opacity="0.6"/>
</svg>
